<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Podium Console - Firebase Pro</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        :root {
            --bg-dark: #0f172a; --card-bg: #1e293b; --accent-blue: #38bdf8;
            --accent-green: #00ff00; --accent-red: #ff0000; --accent-orange: #f59e0b;
            --text-main: #f8fafc; --text-dim: #94a3b8;
        }
        body { 
            font-family: 'Inter', sans-serif; background-color: var(--bg-dark); color: var(--text-main); 
            padding: 20px; margin: 0; display: flex; flex-direction: column; align-items: center;
        }
        .container { width: 100%; max-width: 500px; }
        .box { 
            background: var(--card-bg); padding: 20px; border-radius: 16px; margin-bottom: 20px; 
            border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
            transition: background 0.2s;
        }

        /* Live Status UI */
        .live-box { border: 2px solid var(--accent-blue); position: relative; overflow: hidden; }
        .bg-red-alert { background-color: var(--accent-red) !important; }
        .blink-hide { visibility: hidden; }
        .bg-blink-black { background-color: #000 !important; }

        /* PIN Screen */
        #pin-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 80vh; }
        #pin-screen input { 
            background: #0f172a; color: white; border: 2px solid var(--accent-blue); 
            padding: 15px; border-radius: 8px; font-size: 1.5rem; text-align: center; width: 160px; outline: none;
        }
        #pin-screen button { background: var(--accent-blue); color: white; margin-top: 20px; padding: 12px 30px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        
        #main-ui { display: none; width: 100%; }
        h3 { margin: 0 0 15px 0; font-size: 1.1rem; color: var(--accent-blue); text-transform: uppercase; }
        label { display: block; font-size: 0.85rem; color: var(--text-dim); margin-bottom: 8px; }
        .time-input-group { display: flex; gap: 10px; align-items: center; justify-content: center; margin-bottom: 15px; }
        input[type="number"], textarea { 
            background: #0f172a; color: white; border: 1px solid #334155; padding: 12px; border-radius: 8px; width: 100%; outline: none;
        }
        .time-input-group input { text-align: center; width: 70px; font-weight: bold; font-size: 1.2rem; }
        button { width: 100%; padding: 14px; margin: 8px 0; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-start { background: var(--accent-green); color: #000; }
        .btn-stop { background: var(--accent-red); color: white; }
        .btn-resume { background: var(--accent-orange); color: white; }
        .btn-reset { background: #475569; color: white; }
        .flex-row { display: flex; gap: 12px; align-items: center; }
        .radio-group { display: flex; gap: 15px; background: #0f172a; padding: 12px; border-radius: 8px; border: 1px solid #334155; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div id="pin-screen">
        <h3>🔒 Security Access</h3>
        <input type="password" id="pinInput" placeholder="PIN" maxlength="4">
        <button onclick="checkPin()">Unlock Console</button>
        <p id="errorMsg" style="color: var(--accent-red); margin-top: 15px; display: none;">Wrong PIN!</p>
    </div>

    <div id="main-ui">
        <div id="live-container" class="box live-box">
            <h3 style="color: var(--accent-orange); text-align: center;">📡 STAGE LIVE PREVIEW</h3>
            <div style="display: flex; justify-content: space-around; text-align: center;">
                <div>
                    <label>વક્તવ્ય સમય</label>
                    <div id="live-speech" style="font-size: 1.6rem; font-weight: bold;">00:00:00</div>
                </div>
                <div style="border-left: 1px solid #334155; height: 50px;"></div>
                <div>
                    <label id="live-label-remain">બાકી સમય</label>
                    <div id="live-countdown" style="font-size: 1.6rem; font-weight: bold; color: var(--accent-green);">00:00:00</div>
                </div>
            </div>
        </div>

        <div class="box">
            <h3>⏲️ Timer Control</h3>
            <div class="time-input-group">
                <input type="number" id="hh" placeholder="HH" value="00">
                <input type="number" id="mm" placeholder="MM" value="00">
                <input type="number" id="ss" placeholder="SS" value="00">
            </div>
            <button class="btn-start" onclick="control('start')">🚀 START</button>
            <div class="flex-row">
                <button class="btn-stop" onclick="control('stop')">🛑 STOP</button>
                <button class="btn-resume" onclick="control('resume')">▶️ RESUME</button>
            </div>
            <button class="btn-reset" onclick="control('reset')">🔄 RESET</button>
        </div>

        <div class="box">
            <h3>💬 Message & Settings</h3>
            <textarea id="msgInput" rows="2" placeholder="સંદેશ લખો..."></textarea>
            <button style="background: var(--accent-blue); color:white;" onclick="control('msg')">📤 SEND MESSAGE</button>
            
            <div class="radio-group" style="margin-top:15px;">
                <label><input type="radio" name="lang_pick" value="gu" checked onclick="changeLang('gu')"> GU</label>
                <label><input type="radio" name="lang_pick" value="en" onclick="changeLang('en')"> EN</label>
                <label><input type="radio" name="lang_pick" value="hi" onclick="changeLang('hi')"> HI</label>
            </div>
        </div>
        <button onclick="location.reload()" style="background:#475569; color:white;">🚪 Logout</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyD63SkDYB69WSUXnADxk-hGTBNz3bK543w",
        authDomain: "hariprabodham-podium-display.firebaseapp.com",
        databaseURL: "https://hariprabodham-podium-display-default-rtdb.asia-southeast1.firebasedatabase.app/",
        projectId: "hariprabodham-podium-display",
        storageBucket: "hariprabodham-podium-display.firebasestorage.app",
        messagingSenderId: "502793105813",
        appId: "1:502793105813:web:70c7d7ef6c51b31400069c"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const podiumRef = database.ref('podium_final');

    const CORRECT_PIN = "3690";
    let currentState = {}, serverOffset = 0, soundPlayed = false, lastBlinkPercent = null;

    // ૧. સર્વર ટાઈમ સાથે સિંક્રોનાઈઝેશન
    database.ref(".info/serverTimeOffset").on("value", (snap) => {
        serverOffset = snap.val();
    });

    function checkPin() {
        if (document.getElementById('pinInput').value === CORRECT_PIN) {
            document.getElementById('pin-screen').style.display = 'none';
            document.getElementById('main-ui').style.display = 'block';
            podiumRef.on('value', (snapshot) => { 
                currentState = snapshot.val() || {}; 
                if(currentState.action === 'reset') soundPlayed = false;
            });
            setInterval(syncLivePreview, 1000);
        } else {
            document.getElementById('errorMsg').style.display = 'block';
        }
    }

    // ૨. ડિસ્પ્લે જેવું જ લાઈવ લોજિક
    function syncLivePreview() {
        if (!currentState.startTime || currentState.action === 'reset') {
            resetUI(); return;
        }

        const now = new Date().getTime() + serverOffset;
        const elapsed = Math.floor((now - currentState.startTime) / 1000);
        const remain = currentState.duration - elapsed;

        document.getElementById('live-speech').innerText = format(elapsed);
        const cdVal = document.getElementById('live-countdown');
        const cdBox = document.getElementById('live-container');

        if (remain <= 0) {
            if (!soundPlayed && remain === 0) { playBeep(); soundPlayed = true; }
            cdVal.innerText = "-" + format(Math.abs(remain));
            cdBox.classList.add('bg-red-alert');
            cdVal.style.color = "white";
            if (Math.abs(remain) % 60 === 0) startBlink(cdBox, "bg");
        } else {
            cdVal.innerText = format(remain);
            cdBox.classList.remove('bg-red-alert');
            const p = Math.ceil((remain / currentState.duration) * 100);
            updateColors(p, cdVal);
        }
    }

    function updateColors(p, el) {
        if (p <= 5) { el.style.color = "#ff3333"; if(lastBlinkPercent !== 5) {lastBlinkPercent=5; startBlink(el, "text");}}
        else if (p <= 25) { el.style.color = "#ffaa00"; if(lastBlinkPercent !== 25) {lastBlinkPercent=25; startBlink(el, "text");}}
        else if (p <= 50) { el.style.color = "#ffff00"; if(lastBlinkPercent !== 50) {lastBlinkPercent=50; startBlink(el, "text");}}
        else { el.style.color = "#00ff00"; }
    }

    function startBlink(el, type) {
        let c = 0;
        let t = setInterval(() => {
            type === "text" ? el.classList.toggle('blink-hide') : el.classList.toggle('bg-blink-black');
            if (++c >= 6) { clearInterval(t); el.classList.remove('blink-hide', 'bg-blink-black'); }
        }, 300);
    }

    function playBeep() {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 1);
    }

    function resetUI() {
        document.getElementById('live-speech').innerText = "00:00:00";
        document.getElementById('live-countdown').innerText = "00:00:00";
        document.getElementById('live-countdown').style.color = "var(--accent-green)";
        document.getElementById('live-container').classList.remove('bg-red-alert');
    }

    function format(s) {
        const h = String(Math.floor(s / 3600)).padStart(2, '0');
        const m = String(Math.floor((s % 3600) / 60)).padStart(2, '0');
        const sc = String(s % 60).padStart(2, '0');
        return `${h}:${m}:${sc}`;
    }

    function control(act) {
        const hh = parseInt(document.getElementById('hh').value) || 0;
        const mm = parseInt(document.getElementById('mm').value) || 0;
        const ss = parseInt(document.getElementById('ss').value) || 0;
        const total = (hh * 3600) + (mm * 60) + ss;
        let store = {...currentState};

        if (act === 'start') {
            store.action = 'start'; store.startTime = new Date().getTime() + serverOffset; store.duration = total;
        } else if (act === 'stop') {
            store.action = 'stop'; // Stop logic
        } else if (act === 'reset') {
            store.action = 'reset';
        } else if (act === 'msg') {
            store.msg = document.getElementById('msgInput').value;
        }
        podiumRef.set(store);
    }

    function changeLang(l) { podiumRef.update({lang: l}); }
</script>
</body>
</html>
