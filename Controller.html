<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Podium Console - Firebase Pro</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        :root {
            --bg-dark: #0f172a; --card-bg: #1e293b; --accent-blue: #38bdf8;
            --accent-green: #22c55e; --accent-red: #ef4444; --accent-orange: #f59e0b;
            --text-main: #f8fafc; --text-dim: #94a3b8;
        }
        body { 
            font-family: 'Inter', sans-serif; background-color: var(--bg-dark); color: var(--text-main); 
            padding: 20px; margin: 0; display: flex; flex-direction: column; align-items: center;
        }
        .container { width: 100%; max-width: 500px; }
        .box { 
            background: var(--card-bg); padding: 20px; border-radius: 16px; margin-bottom: 20px; 
            border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
        }
        .live-box { border: 2px solid var(--accent-orange); text-align: center; transition: 0.2s; }
        .bg-red-alert { background-color: #ff0000 !important; }
        .blink-hide { visibility: hidden; }
        .bg-blink-black { background-color: #000000 !important; }

        #pin-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 80vh; }
        #pin-screen input { background: #0f172a; color: white; border: 2px solid var(--accent-blue); padding: 15px; border-radius: 8px; font-size: 1.5rem; text-align: center; width: 160px; outline: none; }
        #pin-screen button { background: var(--accent-blue); color: white; margin-top: 20px; padding: 12px 30px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        #main-ui { display: none; width: 100%; }
        h3 { margin: 0 0 15px 0; font-size: 1.1rem; color: var(--accent-blue); text-transform: uppercase; }
        label { display: block; font-size: 0.85rem; color: var(--text-dim); margin-bottom: 8px; }
        .time-input-group { display: flex; gap: 10px; align-items: center; justify-content: center; margin-bottom: 15px; }
        input[type="number"], textarea { background: #0f172a; color: white; border: 1px solid #334155; padding: 12px; border-radius: 8px; width: 100%; outline: none; }
        .time-input-group input { text-align: center; width: 70px; font-weight: bold; font-size: 1.2rem; }
        button { width: 100%; padding: 14px; margin: 8px 0; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-start { background: var(--accent-green); color: white; }
        .btn-stop { background: var(--accent-red); color: white; }
        .btn-resume { background: var(--accent-orange); color: white; }
        .btn-reset { background: #475569; color: white; }
        .btn-msg { background: var(--accent-blue); color: white; }
        .btn-clear { background: transparent; border: 1px solid var(--accent-red); color: var(--accent-red); }
        .flex-row { display: flex; gap: 12px; align-items: center; }
        .adjustment-box { background: #0f172a; padding: 15px; border-radius: 12px; border: 1px solid #334155; margin-top: 10px; }
        .val-text { color: var(--accent-blue); font-weight: bold; }
        input[type="range"] { -webkit-appearance: none; width: 100%; height: 6px; background: #334155; border-radius: 5px; outline: none; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; background: var(--accent-blue); border-radius: 50%; cursor: pointer; border: 2px solid white; }
        .radio-group { display: flex; gap: 15px; background: #0f172a; padding: 12px; border-radius: 8px; border: 1px solid #334155; margin-bottom: 20px; }
        input[type="color"] { height: 40px; cursor: pointer; border: none; background: none; width: 100%; margin-bottom: 15px;}
    </style>
</head>
<body>
<div class="container">
    <div id="pin-screen">
        <h3>🔒 Security Access</h3>
        <input type="password" id="pinInput" placeholder="PIN" maxlength="4">
        <button onclick="checkPin()">Unlock Console</button>
        <p id="errorMsg" style="color: var(--accent-red); margin-top: 15px; display: none;">ખોટો PIN!</p>
    </div>

    <div id="main-ui">
        <div id="live-box" class="box live-box">
            <h3 style="color: var(--accent-orange);">📡 Podium Preview</h3>
            <div style="display: flex; justify-content: space-around;">
                <div><label>Speech Time</label><div id="live-speech" style="font-size: 1.5rem; font-weight: bold;">00:00:00</div></div>
                <div style="border-left: 1px solid #334155; height: 40px; margin-top: 10px;"></div>
                <div><label>Remaining Time</label><div id="live-countdown" style="font-size: 1.5rem; font-weight: bold; color: #00ff00;">00:00:00</div></div>
            </div>
        </div>

        <div class="box">
            <h3>⏲️ Timer Control</h3>
            <label>Speech Duration (HH : MM : SS)</label>
            <div class="time-input-group">
                <input type="number" id="hh" min="0" max="23" value="00">
                <input type="number" id="mm" min="0" max="59" value="00">
                <input type="number" id="ss" min="0" max="59" value="00">
            </div>
            <button class="btn-start" onclick="control('start')">🚀 START</button>
            <div class="flex-row"><button class="btn-stop" onclick="control('stop')">🛑 STOP</button><button class="btn-resume" onclick="control('resume')">▶️ RESUME</button></div>
            <button class="btn-reset" onclick="control('reset')">🔄 RESET TIMER</button>

            <div class="adjustment-box">
                <div class="slider-label"><span>🔊 Audio Volume</span> <span id="volPerc" class="val-text">30%</span></div>
                <input type="range" id="volBar" min="0" max="100" value="30" step="10" oninput="adjustDisplay()">
                <label style="margin-top:10px; cursor:pointer; display:flex; align-items:center; gap:8px;"><input type="checkbox" id="muteCheck" onclick="adjustDisplay()"> Mute Audio</label>
            </div>
        </div>

        <div class="box">
            <h3>💬 Message Center</h3>
            <textarea id="msgInput" rows="3" placeholder="સંદેશ લખો..."></textarea>
            <div class="flex-row"><button class="btn-msg" onclick="control('msg')">📤 SEND</button><button class="btn-clear" onclick="clearMsg()">🗑️ CLEAR</button></div>
        </div>

        <div class="box">
            <h3>🛠️ Display Adjustments</h3>
            <label>Select Language</label>
            <div class="radio-group">
                <label><input type="radio" name="lang_pick" value="gu" checked onclick="changeLang('gu')"> ગુજરાતી</label>
                <label><input type="radio" name="lang_pick" value="en" onclick="changeLang('en')"> English</label>
                <label><input type="radio" name="lang_pick" value="hi" onclick="changeLang('hi')"> हिन्दी</label>
            </div>
            <label>Text Color</label>
            <input type="color" id="clrPick" value="#ffffff" oninput="adjustDisplay()">
            <div class="adjustment-box">
                <div class="slider-label"><span>✨ Brightness</span> <span id="brightVal" class="val-text">100%</span></div>
                <input type="range" id="brightness" min="10" max="100" value="100" step="10" oninput="adjustDisplay()">
                <div class="slider-label" style="margin-top:15px;"><span>🌈 Saturation</span> <span id="satVal" class="val-text">100%</span></div>
                <input type="range" id="saturation" min="0" max="100" value="100" step="10" oninput="adjustDisplay()">
            </div>
        </div>
        <button onclick="location.reload()" style="background:#475569; color:white; margin-bottom:40px;">🚪 Logout</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyD63SkDYB69WSUXnADxk-hGTBNz3bK543w",
        authDomain: "hariprabodham-podium-display.firebaseapp.com",
        databaseURL: "https://hariprabodham-podium-display-default-rtdb.asia-southeast1.firebasedatabase.app/",
        projectId: "hariprabodham-podium-display",
        storageBucket: "hariprabodham-podium-display.firebasestorage.app",
        messagingSenderId: "502793105813",
        appId: "1:502793105813:web:70c7d7ef6c51b31400069c"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const podiumRef = database.ref('podium_final');

    const CORRECT_PIN = "3690"; 
    let pausedAt = 0, currentState = {}, serverOffset = 0;
    let soundPlayed = false, lastBlinkPercent = null, isBlinking = false;

    database.ref(".info/serverTimeOffset").on("value", (snap) => { serverOffset = snap.val(); });

    function checkPin() {
        if (document.getElementById('pinInput').value === CORRECT_PIN) {
            document.getElementById('pin-screen').style.display = 'none';
            document.getElementById('main-ui').style.display = 'block';
            podiumRef.on('value', (snapshot) => { 
                currentState = snapshot.val() || {}; 
                if (currentState.action === 'reset') { soundPlayed = false; lastBlinkPercent = null; }
            });
            setInterval(syncPreview, 1000);
        } else { document.getElementById('errorMsg').style.display = 'block'; }
    }

    function syncPreview() {
        if (!currentState.startTime || currentState.action === 'reset') { resetPreview(); return; }
        const now = new Date().getTime() + serverOffset;
        let elapsed = currentState.action === 'start' ? Math.floor((now - currentState.startTime) / 1000) : Math.floor(pausedAt / 1000);
        
        document.getElementById('live-speech').innerText = format(elapsed);
        const cdVal = document.getElementById('live-countdown'), cdBox = document.getElementById('live-box');
        const remain = currentState.duration - elapsed;

        // સુધારો: જો duration 0 હોય તો હંમેશા લીલા રંગમાં 00:00:00 રાખવું
        if (currentState.duration <= 0) {
            cdVal.innerText = "00:00:00";
            cdVal.style.color = "#00ff00";
            cdBox.classList.remove('bg-red-alert');
            return;
        }

        if (remain < 0) {
            if (!soundPlayed && currentState.action === 'start') { playBeep(); soundPlayed = true; }
            cdVal.innerText = "-" + format(Math.abs(remain));
            cdBox.classList.add('bg-red-alert'); cdVal.style.color = "white";
            if (Math.abs(remain) % 60 === 0 && !isBlinking && currentState.action === 'start') startBlink(cdBox, "bg");
        } else if (remain === 0) {
            if (!soundPlayed && currentState.action === 'start') { playBeep(); soundPlayed = true; }
            cdVal.innerText = "00:00:00";
            cdBox.classList.add('bg-red-alert');
            cdVal.style.color = "white";
        } else {
            cdVal.innerText = format(remain); cdBox.classList.remove('bg-red-alert');
            const p = Math.ceil((remain / currentState.duration) * 100);
            if (p <= 5) { cdVal.style.color = "#ff3333"; if(lastBlinkPercent!==5 && currentState.action==='start'){lastBlinkPercent=5; startBlink(cdVal,"text");}}
            else if (p <= 25) { cdVal.style.color = "#ffaa00"; if(lastBlinkPercent!==25 && currentState.action==='start'){lastBlinkPercent=25; startBlink(cdVal,"text");}}
            else if (p <= 50) { cdVal.style.color = "#ffff00"; if(lastBlinkPercent!==50 && currentState.action==='start'){lastBlinkPercent=50; startBlink(cdVal,"text");}}
            else { cdVal.style.color = "#00ff00"; }
        }
    }

    function startBlink(el, type) {
        isBlinking = true; let c = 0;
        let t = setInterval(() => {
            type === "text" ? el.classList.toggle('blink-hide') : el.classList.toggle('bg-blink-black');
            if (++c >= 6) { clearInterval(t); el.classList.remove('blink-hide', 'bg-blink-black'); isBlinking = false; }
        }, 300);
    }

    function playBeep() {
        if (currentState.mute) return;
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator(); const g = ctx.createGain();
        osc.type = 'sine'; osc.frequency.setValueAtTime(880, ctx.currentTime);
        g.gain.setValueAtTime((currentState.vol || 30) / 100, ctx.currentTime);
        osc.connect(g); g.connect(ctx.destination);
        osc.start(); osc.stop(ctx.currentTime + 1);
    }

    function resetPreview() {
        document.getElementById('live-speech').innerText = "00:00:00";
        document.getElementById('live-countdown').innerText = "00:00:00";
        document.getElementById('live-countdown').style.color = "#00ff00";
        document.getElementById('live-box').classList.remove('bg-red-alert');
    }

    function format(s) {
        const h = String(Math.floor(s / 3600)).padStart(2, '0');
        const m = String(Math.floor((s % 3600) / 60)).padStart(2, '0');
        const sc = String(s % 60).padStart(2, '0');
        return `${h}:${m}:${sc}`;
    }

    function changeLang(l) { adjustDisplay(); }

    function control(act) {
        const hh = parseInt(document.getElementById('hh').value) || 0;
        const mm = parseInt(document.getElementById('mm').value) || 0;
        const ss = parseInt(document.getElementById('ss').value) || 0;
        const total = (hh * 3600) + (mm * 60) + ss;
        let store = {...currentState};

        if (act === 'start') {
            store.action = 'start'; store.startTime = new Date().getTime() + serverOffset; store.duration = total; pausedAt = 0;
        } else if (act === 'stop') {
            store.action = 'stop'; pausedAt = (new Date().getTime() + serverOffset) - (store.startTime || new Date().getTime());
        } else if (act === 'resume') {
            if (store.action === 'stop') { store.action = 'start'; store.startTime = new Date().getTime() + serverOffset - pausedAt; }
        } else if (act === 'reset') {
            store.action = 'reset'; pausedAt = 0;
            document.getElementById('hh').value="00"; document.getElementById('mm').value="00"; document.getElementById('ss').value="00";
        }
        if (act === 'msg') store.msg = document.getElementById('msgInput').value || "CLEAR_MSG";
        podiumRef.set(store);
    }

    function clearMsg() { document.getElementById('msgInput').value = ""; control('msg'); }

    function adjustDisplay() {
        let s = {...currentState};
        s.brightness = document.getElementById('brightness').value;
        s.saturation = document.getElementById('saturation').value;
        s.clr = document.getElementById('clrPick').value;
        s.lang = document.querySelector('input[name="lang_pick"]:checked').value;
        s.vol = document.getElementById('volBar').value;
        s.mute = document.getElementById('muteCheck').checked;
        document.getElementById('brightVal').innerText = s.brightness + "%";
        document.getElementById('satVal').innerText = s.saturation + "%";
        document.getElementById('volPerc').innerText = s.vol + "%";
        podiumRef.set(s);
    }
</script>
</body>
</html>
